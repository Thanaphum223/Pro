<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Developer Profile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #2a2a40;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            width: 300px;
        }
        h1 { margin-bottom: 5px; font-size: 24px; }
        p { color: #a0a0b5; margin-bottom: 20px; font-size: 14px; }
        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            background-color: #007acc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .btn:hover { background-color: #005f9e; }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Your Name</h1>
        <p>Information Technology Student | Software QA | C# Developer</p>
        
        <a href="https://github.com/yourusername" target="_blank" class="btn">GitHub Profile</a>
        <a href="https://linkedin.com/in/yourusername" target="_blank" class="btn">LinkedIn</a>
        <a href="mailto:your.email@example.com" class="btn">Contact Me</a>
    </div>

</body>
</html>
